name: CI/CD

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint

  tsc:
    name: Types check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run the types check
        run: npm run tsc

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run the tests
        run: npm run test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, tsc, tests]
    if: ${{ github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master') }}
    timeout-minutes: 30
    concurrency:
      group: sg-replay-parser-prod
      cancel-in-progress: true

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_DIR: ${{ secrets.CD_APP_DIR }}
          BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.CD_SSH_HOST }}
          username: ${{ secrets.CD_SSH_USER }}
          key: ${{ secrets.CD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CD_SSH_PORT }}
          command_timeout: 30m
          envs: APP_DIR,BRANCH
          script: |
            if not test -d "$APP_DIR/.git"
              echo "ERROR: $APP_DIR is not a git repository" >&2
              exit 66
            end

            set node_version (string trim < "$APP_DIR/.nvmrc")
            set node_bin "$HOME/.nvm/versions/node/$node_version/bin"

            if not test -d "$node_bin"
              echo "ERROR: Node version $node_version is not installed at $node_bin" >&2
              exit 69
            end

            set -gx PATH "$node_bin" $PATH

            if not command -q pm2
              echo "ERROR: pm2 is not installed on server" >&2
              exit 69
            end

            cd "$APP_DIR"; or exit $status

            git fetch --prune origin; or exit $status

            if git show-ref --verify --quiet "refs/heads/$BRANCH"
              git checkout "$BRANCH"; or exit $status
            else
              git checkout -b "$BRANCH" "origin/$BRANCH"; or exit $status
            end

            git reset --hard "origin/$BRANCH"; or exit $status

            npm ci; or exit $status
            npm run build-dist; or exit $status
            pm2 startOrReload ecosystem.config.cjs --update-env; or exit $status
            pm2 save; or exit $status

            echo "Deploy finished: branch=$BRANCH dir=$APP_DIR"
