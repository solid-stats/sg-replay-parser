name: CI/CD

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint

  tsc:
    name: Types check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run the types check
        run: npm run tsc

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run the tests
        run: npm run test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, tsc, tests]
    if: ${{ github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master') }}
    timeout-minutes: 30
    concurrency:
      group: sg-replay-parser-prod
      cancel-in-progress: true

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_DIR: ${{ secrets.CD_APP_DIR }}
          BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.CD_SSH_HOST }}
          username: ${{ secrets.CD_SSH_USER }}
          key: ${{ secrets.CD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CD_SSH_PORT }}
          script_stop: true
          command_timeout: 30m
          envs: APP_DIR,BRANCH
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            bash "$APP_DIR/deploy/remote-deploy.sh" "$APP_DIR" "$BRANCH"
